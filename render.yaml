services:
  - type: web
    name: t3e-interface
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: MDP_APP
        sync: false
      - key: NODE_ENV
        value: production
